name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 需要建立 release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # build.bat 會讀 git tag

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Compute cache month
        id: cache-month
        shell: pwsh
        run: echo "month=$(Get-Date -Format yyyy-MM)" >> $env:GITHUB_OUTPUT

      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: tools/ffmpeg.exe
          # 用月份當 cache key — 每月會 refresh 一次抓最新的 BtbN build
          key: ffmpeg-btbn-${{ steps.cache-month.outputs.month }}

      - name: Download ffmpeg (BtbN latest)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # `latest/download/<asset>` 是 GitHub 的永久 URL，ffmpeg-master-latest-win64-gpl.zip 是 BtbN 每月 build 的標準檔名
          $url = "https://github.com/BtBN/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-win64-gpl.zip"
          $zip = "$env:RUNNER_TEMP\ffmpeg.zip"
          $extract = "$env:RUNNER_TEMP\ffmpeg-extract"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          $ffmpeg = Get-ChildItem -Path $extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $ffmpeg) { throw "ffmpeg.exe not found in BtbN zip" }
          New-Item -ItemType Directory -Path tools -Force | Out-Null
          Copy-Item $ffmpeg.FullName -Destination tools\ffmpeg.exe -Force
          Write-Host "ffmpeg.exe size: $((Get-Item tools\ffmpeg.exe).Length) bytes"

      - name: Cache mp3gain
        id: cache-mp3gain
        uses: actions/cache@v4
        with:
          path: tools/mp3gain.exe
          key: mp3gain-1.4.6

      - name: Install mp3gain via winget
        if: steps.cache-mp3gain.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          winget install GlenSawyer.MP3Gain --silent --accept-package-agreements --accept-source-agreements --disable-interactivity
          $src = "C:\Program Files (x86)\MP3Gain\mp3gain.exe"
          if (-not (Test-Path $src)) { throw "mp3gain.exe not found after install" }
          New-Item -ItemType Directory -Path tools -Force | Out-Null
          Copy-Item $src -Destination tools\mp3gain.exe -Force

      # NOTE: client_secret.json is intentionally NOT injected. Open-source
      # releases ship without credentials; self-hosters supply their own per the
      # setup guide. build.bat fails if any client_secret.json ends up in the zip.

      - name: Build
        shell: cmd
        env:
          VERSION: ${{ github.ref_name }}     # e.g. v0.5.0 → build.bat strips the v
        run: scripts\build.bat

      - name: Smoke-test the bundle
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path backend\dist\yt-mp3-tool -Filter yt-mp3-tool.exe -Recurse | Select-Object -First 1
          if (-not $exe) { throw "yt-mp3-tool.exe not produced" }
          $reported = & $exe.FullName --health-check 2>&1 | Out-String
          $expected = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "Reported version: $reported"
          if (-not ($reported -match [regex]::Escape($expected))) {
            throw "Bundle reports wrong version. Expected $expected, got $reported"
          }

      - name: Upload as release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} dist/*.zip --title ${{ github.ref_name }} --notes "Auto-generated release"
